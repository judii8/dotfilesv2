# =========================================================================
# FONTS & TYPOGRAPHY
# =========================================================================
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0

# disable ligatures if you want pure plain code characters, or keep them on
disable_ligatures never

# =========================================================================
# COLOR SCHEME (Matches Waybar, Niri & Fuzzel Exactly)
# =========================================================================

background            #1c2024
foreground            #cbd5e1
selection_background  #2d3748
selection_foreground  #7e96bd
url_color             #7e96bd

# cursor customization
cursor                #cbd5e1
cursor_text_color     #1c2024
cursor_shape          block
cursor_blink_interval 0.5

# =========================================================================
# THE TERMINAL PALETTE (Muted Monochromatic + Blue Accents)
# =========================================================================

# black
color0 #16171f
color8 #232433

# red
color1 #ff3333
color9 #ff5555

# green
color2 #9ece6a
color10 #b9f27c

# yellow / orange
color3 #e0af68
color11 #ff9e3b

# blue (your active system accent)
color4 #7aa2f7
color12 #7aa2f7

# magenta
color5 #bb9af7
color13 #bb9af7

# cyan
color6 #7dcfff
color14 #7dcfff

# white / gray
color7 #a3a3a3
color15 #ffffff

# =========================================================================
# WINDOW LAYOUT & PADDING
# =========================================================================
window_padding_width 12
hide_window_decorations yes
confirm_os_window_close 0

# =========================================================================
# PERFORMANCE & PERFORMANCE TUNING
# =========================================================================
repaint_delay    8
input_delay      2
sync_to_monitor  yes

# =========================================================================
# MOUSE & SCROLLBACK
# =========================================================================
scrollback_lines 10000
detect_urls      yes
mouse_hide_wait  3.0